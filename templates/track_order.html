<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تتبع طلبك - سيريانوغا</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"></head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh;"><div class="container py-5"><div class="row justify-content-center"><div class="col-md-6"><div class="card shadow-lg border-0 rounded-4"><div class="card-header bg-dark text-white text-center rounded-top-4"><i class="fas fa-search-location fa-2x mb-2"></i><h4 class="mb-0">تتبع طلبك</h4></div><div class="card-body p-4">{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}<p class="text-muted text-center mb-4">أدخل رقم التتبع الذي تلقيته عبر واتساب</p><form method="POST"><div class="mb-4"><label class="form-label">رقم التتبع</label><div class="input-group"><span class="input-group-text"><i class="fas fa-barcode"></i></span><input type="text" name="tracking_number" class="form-control form-control-lg" required></div></div><button type="submit" class="btn btn-dark w-100 py-3 fw-bold"><i class="fas fa-truck"></i> تتبع الطلب</button></form><hr><div class="text-center"><p class="small text-muted">لم تصلك رسالة التتبع؟ <a href="/">اتصل بنا</a></p></div></div></div></div></div></div></body>
</html>
